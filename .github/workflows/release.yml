name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  version:
    name: Compute release version
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version
        id: version
        shell: bash
        run: |
          base="$(date -u +'%Y.%m.%d')"
          count="$(git tag --list "v${base}.*" | wc -l | tr -d ' ')"
          patch="$((count + 1))"
          version="${base}.${patch}"
          tag="v${version}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

  windows:
    name: Build, test and publish Windows
    runs-on: windows-latest
    needs: version
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore .\Dw.sln

      - name: Build
        run: dotnet build .\Dw.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test .\Dw.sln --configuration Release --no-build

      - name: Publish win-x64
        shell: pwsh
        run: .\scripts\publish-win-x64.ps1 -Version ${{ needs.version.outputs.version }} -Commit $env:GITHUB_SHA -ReleaseBaseUrl "https://github.com/${{ github.repository }}/releases/download/${{ needs.version.outputs.tag }}"

      - name: Package win-x64
        shell: pwsh
        run: Compress-Archive -Path artifacts\win-x64\dw.exe,artifacts\win-x64\Microsoft.Data.SqlClient.SNI.dll -DestinationPath artifacts\dw-win-x64.zip -Force

      - name: Upload win artifact
        uses: actions/upload-artifact@v4
        with:
          name: dw-win-x64
          path: |
            artifacts/dw-win-x64.zip
            artifacts/win-x64/release.json

  linux:
    name: Build, test and publish Linux
    runs-on: ubuntu-latest
    needs: version
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Check flake
        uses: DeterminateSystems/flake-checker-action@main

      - name: Build and test with Nix
        run: nix run .#check

      - name: Publish linux-x64
        run: DW_VERSION=${{ needs.version.outputs.version }} DW_COMMIT=${{ github.sha }} RELEASE_BASE_URL="https://github.com/${{ github.repository }}/releases/download/${{ needs.version.outputs.tag }}" nix run .#publish-linux-x64

      - name: Package linux-x64
        run: tar -czf artifacts/dw-linux-x64.tar.gz -C artifacts/linux-x64 dw

      - name: Upload linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: dw-linux-x64
          path: |
            artifacts/dw-linux-x64.tar.gz
            artifacts/linux-x64/release.json

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - version
      - windows
      - linux
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create tag
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ needs.version.outputs.tag }}" -m "Release ${{ needs.version.outputs.tag }}"
          git push origin "${{ needs.version.outputs.tag }}"

      - name: Build release manifest
        shell: bash
        run: |
          win_sha="$(sha256sum artifacts/dw-win-x64/dw-win-x64.zip | awk '{print $1}')"
          linux_sha="$(sha256sum artifacts/dw-linux-x64/dw-linux-x64.tar.gz | awk '{print $1}')"
          cat > release.json <<EOF
          {
            "schema": 1,
            "version": "${{ needs.version.outputs.version }}",
            "commit": "${{ github.sha }}",
            "channel": "stable",
            "assets": [
              {
                "rid": "win-x64",
                "fileName": "dw-win-x64.zip",
                "sha256": "$win_sha",
                "url": "https://github.com/${{ github.repository }}/releases/download/${{ needs.version.outputs.tag }}/dw-win-x64.zip"
              },
              {
                "rid": "linux-x64",
                "fileName": "dw-linux-x64.tar.gz",
                "sha256": "$linux_sha",
                "url": "https://github.com/${{ github.repository }}/releases/download/${{ needs.version.outputs.tag }}/dw-linux-x64.tar.gz"
              }
            ]
          }
          EOF

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: ${{ needs.version.outputs.tag }}
          files: |
            artifacts/dw-win-x64/dw-win-x64.zip
            artifacts/dw-linux-x64/dw-linux-x64.tar.gz
            release.json
