name: Rust Release

on:
  push:
    branches:
      - master
    paths:
      - VERSION
  workflow_dispatch:

permissions:
  contents: write

jobs:
  version:
    name: Compute release version
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Compute version
        id: version
        shell: bash
        run: |
          version="$(tr -d '[:space:]' < VERSION)"
          tag="v${version}"
          if git rev-parse --quiet --verify "refs/tags/${tag}" >/dev/null; then
            echo "Release tag already exists: ${tag}" >&2
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

  linux:
    name: Build and publish Linux
    runs-on: ubuntu-latest
    needs: version
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Setup Cachix
        uses: cachix/cachix-action@v17
        with:
          name: sachahjkl
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Check flake
        uses: DeterminateSystems/flake-checker-action@main

      - name: Build and test
        run: nix run .#check

      - name: Publish linux-x64
        run: nix develop -c env VERSION=${{ needs.version.outputs.version }} COMMIT=${{ github.sha }} RELEASE_BASE_URL="https://github.com/${{ github.repository }}/releases/download/${{ needs.version.outputs.tag }}" bash ./scripts/publish-linux-x64.sh

      - name: Upload linux artifact
        uses: actions/upload-artifact@v5
        with:
          name: dw-linux-x64
          path: |
            artifacts/linux-x64/dw-linux-x64.tar.gz
            artifacts/linux-x64/release.json

  windows:
    name: Build and publish Windows
    runs-on: windows-latest
    needs: version
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build and test
        shell: pwsh
        run: |
          cargo fmt --all -- --check
          cargo test --workspace --locked
          cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Publish win-x64
        shell: pwsh
        run: .\scripts\publish-win-x64.ps1 -Version ${{ needs.version.outputs.version }} -Commit $env:GITHUB_SHA -ReleaseBaseUrl "https://github.com/${{ github.repository }}/releases/download/${{ needs.version.outputs.tag }}"

      - name: Upload win artifact
        uses: actions/upload-artifact@v5
        with:
          name: dw-win-x64
          path: |
            artifacts/win-x64/dw-win-x64.zip
            artifacts/win-x64/release.json

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - version
      - linux
      - windows
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Write release manifest
        shell: bash
        run: |
          VERSION="${{ needs.version.outputs.version }}" \
          COMMIT="${{ github.sha }}" \
          RELEASE_BASE_URL="https://github.com/${{ github.repository }}/releases/download/${{ needs.version.outputs.tag }}" \
          bash ./scripts/write-release-manifest.sh

      - name: Create release tag
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ needs.version.outputs.tag }}" -m "${{ needs.version.outputs.tag }}"
          git push origin "${{ needs.version.outputs.tag }}"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: ${{ needs.version.outputs.tag }}
          files: |
            artifacts/dw-linux-x64/dw-linux-x64.tar.gz
            artifacts/dw-win-x64/dw-win-x64.zip
            artifacts/release.json
