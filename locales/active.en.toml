"agent.workspace-instructions" = "# DevWorkflow Workspace\n\nThis workspace is managed by DevWorkflow.\n\nContext:\n\n- Project: `{project}`\n- Work items:\n{items}\n\nDevWorkflow actions:\n\n- ADO: assigned, item show, context ai, and state set.\n- Work: current, open, sync, and preflight.\n- Content: work item doing/add/remove, work repo add/latest, and work PR start.\n- Child tasks and handoffs: work task child create and work handoff validate.\n- Lifecycle: work commit, finish, teardown, and prune.\n- Database: schema, describe, and query.\n\nRules:\n\n1. Identify the current workspace with work current before acting.\n2. Read every work item with ADO item show before coding.\n3. Read AI context with ADO context ai before acting on ADO context.\n4. Use DB schema, describe, and query when database context can clarify the change.\n5. Before working, verify that the environment's required initial setup is present.\n6. Complete `plan.md` before implementation.\n7. Run work preflight before implementation, child task creation, or another irreversible action.\n8. Run work handoff validate before sub-agents and before work finish.\n9. If the primary work item is a User Story or Bug, after `plan.md` is complete and before implementation starts, create at least one ADO child task with work task child create, then as many as the plan requires.\n10. Write all user/project text in French: plans, comments, commit/PR messages, task titles, progress summaries, and final explanations.\n11. Structure the plan explicitly by domain when possible: front, back, db, or other repositories. Use sub-agents for independent workstreams when possible.\n12. Run work sync before lifecycle decisions when local ADO context may be stale.\n13. Use work commit for intermediate commits.\n14. Use work finish for final push/PR flows.\n15. Use work teardown or prune for cleanup.\n"
