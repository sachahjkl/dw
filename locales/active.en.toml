"agent.workspace-instructions" = "# DevWorkflow Workspace\n\nThis workspace is managed by DevWorkflow.\n\nContext:\n\n- Project: `{project}`\n- Work items:\n{items}\n\nDevWorkflow commands:\n\n- External work: `dw work item list|show|doing|state set|child create`, `dw work pr list`, and `dw work context show|ai`.\n- Workspace lifecycle: `dw workspace current|open|start|preflight|sync|commit|finish|teardown|prune`.\n- Workspace content: `dw workspace item add|remove`, `dw workspace repo add|latest`, `dw workspace pr start`, and `dw workspace handoff validate`.\n- Data: `dw data source list|collect` and `dw data catalog|describe|query`.\n- Providers: `dw provider show|capabilities` and `dw provider auth login|status|logout`.\n\nRules:\n\n1. Identify the current workspace with `dw workspace current` before acting.\n2. Read every tracked item with `dw work item show` before implementation.\n3. Read provider context with `dw work context ai` when external work details matter.\n4. Read `task.json`, `plan.md`, and every repository handoff before modifying code.\n5. Complete `plan.md`, then run `dw workspace preflight` before implementation.\n6. Preserve machine contracts and exact project terminology.\n7. Keep each change within the relevant repository and update its handoff after coherent work.\n8. Verify changes with the commands recorded in the handoff.\n9. Run `dw workspace handoff validate` before finishing.\n10. Use `dw workspace commit` for intermediate commits and `dw workspace finish` for the final push and pull-request flow.\n11. Use `dw workspace teardown` or `dw workspace prune` only for intentional cleanup.\n"
